<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue JS Brojač</title>

    <!-- CSS ide u HEAD -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="app">
        <p>Trenutni broj</p>

        <h1>{{ brojac }}</h1>

        <div class="buttons">
            <button @click="uvecaj">Uvećaj</button>
            <button @click="umanji">Umanji</button>
        </div>

        <div class="warning" v-if="upozori">
            Broj ne može biti manji od 0
        </div>
    </div>

    <!-- SCRIPT ide IZVAN #app -->
    <script src="vue.global.js"></script>
    <script src="app.js"></script>

</body>
</html>
