<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Hello world</title>

    <style>
        .nojs{
            background-color: red;
            color: white;
            font-size: 2rem;
            padding: 20px;
            position: fixed;
            top: 0;
            width: 100%;
        }
    </style>

</head>
<body>
    
    <p id="ispis">

    </p>

    <div id="ue">

    </div>

    <button onclick="alert('Hello world 9')">
        Klikni me
    </button>

    <div
    onmouseover="this.style.backgroundColor='red'"
    onmouseleave="this.style.backgroundColor='white'"
    >
        Edunova
    </div>

    <!-- Kad pišem mala slova,on ih prikazuje kao velika -->
    <input type="text" name="" id="" style="font-size: 3rem;"
    onkeyup="this.value=this.value.toUpperCase()"
    >


    <noscript>
        <div class="nojs">
            Vaš preglednik ne podržava JavaScript
        </div>
    </noscript>

    <!-- Ako želimo izvoditi JS direktno iz HTML_a -->
    <script>
        // ovo je jedna linija komentara

        /*
        komentar kroz 
        više linija
        */

       // alert('Hello world 1'); // ; ne treba ali kaako je predavač matori developer stavljati ću je

        document.write('Hello world 2'); // ovo nećemo raditi

        console.log('Hello world 3');

        // console.logiraj('Hello world 4'); // index.html:44 Uncaught TypeError: console.logiraj is not a function
        // console.logiraj'Hello world 4'); // Uncaught SyntaxError: Unexpected string (at index.html:45:24) - nedostaje zagada

    </script>

    <!-- Učitanje vanjske JS datoteke -->
        <script src="skripta.js"></script>

</body>
</html>
